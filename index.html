<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gliederung</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #ffffff;
    --ink: #111827;
    --ink-light: #374151;
    --ink-muted: #6b7280;
    --accent: #0B2351;
    --accent-light: #3b6ef0;
    --accent-dark: #1e3a8a;
    --drop-idle: #f0f4fa;
    --drop-hover: #dbeafe;
    --drop-correct: #dcfce7;
    --drop-wrong:   #fee2e2;
    --card-bg: #eff6ff;
    --card-border: #0b245123;
    --shadow: rgba(30,58,138,0.0);
    --radius: 6px;
  }
 
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-user-select: none;
  } 
  
  body {
    font-family: 'Roboto', sans-serif;
    background: var(--bg);
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 0;
  }
 
  /* ── Header ── */
  header {
    background: var(--accent-dark);
    color: #ffffff;
    padding: 2rem 3rem 1.75rem;
    position: relative;
    overflow: hidden;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #93c5fd, var(--accent));
  }
  header h1 {
    font-family: 'Roboto', sans-serif;
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  header p {
    margin-top: 0.5rem;
    font-size: 0.92rem;
    color: #bfdbfe;
    font-weight: 300;
    max-width: 640px;
  }
  .header-badge {
    display: inline-block;
    margin-top: 1rem;
    font-family: 'Roboto', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    color: #93c5fd;
    border: 1px solid #93c5fd;
    padding: 0.2rem 0.65rem;
    border-radius: 2px;
  }
 
  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
 
  /* ── Card Pool (left panel) ── */
  #pool-panel {
    background: var(--bg-alt);
    border-right: 1px solid #dbeafe;
    padding: 1.5rem 1.2rem;
    position: sticky;
    top: 0;
    align-self: start;
    height: 100%;
    overflow-y: auto;
  }
  #pool-panel h2 {
    font-family: 'Roboto', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 1rem;
    padding-bottom: 0.6rem;
  }
  #card-pool {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    min-height: 60px;
  }
  .card-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding-bottom: 0.7rem;
    margin-bottom: 0.2rem;
    border-bottom: 1px dashed #bfdbfe;
  }
  .card-group:last-child {
    border-bottom: none;
    padding-bottom: 0;
    margin-bottom: 0;
  }
 
  /* ── Drop Zone Panel (right) ── */
  #zones-panel {
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    overflow-y: auto;
    height: 100%;
    user-select: none !important;
  }
 
  .drop-zone-wrapper {
    background: var(--bg);
    border: 1px solid #bfdbfe;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px var(--shadow);
    transition: box-shadow 0.2s;
    flex-shrink: 0;
    user-select: none !important;

  }
  .drop-zone-wrapper:hover {
    box-shadow: 0 3px 12px var(--shadow);
  }
 
  .zone-header {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.65rem 1rem;
    background: var(--accent);
    color: #ffffff;
    user-select: none !important;
  }
  .zone-number {
    font-family: 'Roboto', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #ffffff;
    min-width: 1.4rem;
    user-select: none !important;
  }
  .zone-title {
    font-family: 'Roboto', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    user-select: none !important;
  }
  .zone-count {
    display: none;
  }
 
  .drop-zone {
    min-height: 56px;
    padding: 0.6rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-content: flex-start;
    transition: background 0.2s;
    background: var(--drop-idle);
    user-select: none !important;
  }
  .drop-zone.drag-over {
    background: var(--drop-hover);
    outline: 2px dashed var(--accent);
    outline-offset: -2px;
  }
  .drop-zone.correct { background: var(--drop-correct); }
  .drop-zone.wrong   { background: var(--drop-wrong); }
  .drop-zone:empty::after {
    content: attr(data-placeholder);
    color: var(--ink-muted);
    font-size: 0.8rem;
    font-style: italic;
    padding: 0.5rem;
    align-self: center;
  }
 
  /* ── Draggable Cards ── */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 0.55rem 0.75rem;
    font-size: 0.82rem;
    font-family: 'Roboto', sans-serif;
    line-height: 1.45;
    color: var(--ink);
    cursor: grab;
    user-select: none !important;
    -webkit-user-select: none; 
    box-shadow: 0 1px 3px var(--shadow);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .card::before {
    content: '›';
    color: var(--accent);
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: -1px;
    user-select: none !important;
  }

  .card:hover {
    box-shadow: 0 3px 10px var(--shadow);
    transform: translateY(-1px);
    user-select: none !important;

  }
  .card.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .card.correct-placed {
    border-color: #4ade80;
    background: #f0fdf4;
  }
  .card.wrong-placed {
    border-color: #f87171;
    background: #fff1f2;
  }
  .locked .card {
    cursor: default;
    pointer-events: none;
  }
  .locked .drop-zone {
    pointer-events: none;
  }
  .locked #card-pool {
    pointer-events: none;
  }
  .card .correct-icon, .card .wrong-icon {
    margin-left: auto;
    flex-shrink: 0;
    font-style: normal;
  }

  .touch-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    opacity: 0.75;
    transform: scale(1.05);
    box-shadow: 0 8px 24px rgba(30,58,138,0.2);
    transition: none;
    max-width: 260px;
  }
 
  footer {
    padding: 1rem 2rem;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
    z-index: 100;
    user-select: none !important;
  }
 
  .btn {
    font-family: 'Roboto', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    padding: 0.6rem 1.5rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: all 0.2s;
    user-select: none !important;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: var(--accent-light); }
  .btn-secondary {
    background: transparent;
    color: var(--ink-light);
    border: 1px solid #bfdbfe;
  }
  .btn-secondary:hover { background: var(--bg-alt); }
 
  /* ── Score Display ── */
  #score-display {
    display: none;
    align-items: center;
    gap: 1.2rem;
    flex-wrap: wrap;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  #score-display.visible { display: flex; }
 
  .score-badge {
    font-family: 'Roboto', sans-serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .score-badge.positive { color: #16a34a; }
  .score-badge.negative { color: #dc2626; }
  .score-sub {
    font-size: 0.75rem;
    color: var(--ink-muted);
    margin-top: 0.15rem;
  }
  .score-label {
    font-size: 0.83rem;
    color: var(--ink-light);
    line-height: 1.5;
  }
  .score-bar {
    height: 6px;
    border-radius: 3px;
    background: #dbeafe;
    width: 140px;
    overflow: hidden;
  }

  .score-msg {
    font-size: 0.83rem;
    font-style: italic;
    color: var(--ink-muted);
  }
  .score-divider {
    width: 1px;
    height: 2.5rem;
    background: #bfdbfe;
    flex-shrink: 0;
  }
 
  /* ── Progress indicator ── */
  #progress-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent), #60a5fa);
    transition: width 0.4s;
    position: fixed;
    top: 0; left: 0;
    z-index: 999;
  }
 
  /* ── Scrollbar ── */
  #pool-panel::-webkit-scrollbar { width: 4px; }
  #pool-panel::-webkit-scrollbar-thumb { background: #c8bfaf; border-radius: 2px; }
 
@media (max-width: 820px) {
  body {
    height: auto;
  }
  main {
    grid-template-columns: 1fr;
    overflow: visible;
    height: auto;
  }
  #pool-panel {
    position: static;
    height: auto;
    overflow-y: visible;
  }
  #card-pool {
    flex-direction: row;
    flex-wrap: wrap;
    user-select: none !important;
  }
  #zones-panel {
    overflow-y: visible;
    height: auto;
    padding: 1rem;
    user-select: none !important;
  }
  header { padding: 1.5rem; }
  header h1 { font-size: 1.4rem; }
  footer {
    position: sticky;
    bottom: 0;
    padding: 1rem;
  }
}
</style>
</head>
<body>

<div id="progress-bar" style="width:0%"></div>

<main>
  <!-- LEFT: card pool -->
  <aside id="pool-panel">
    <h2>Nicht zugeordnet</h2>
    <div id="card-pool" 
         data-placeholder="Alle Karten zugeordnet ✓"
         ondragover="onDragOver(event)" 
         ondragleave="onDragLeave(event)" 
         ondrop="onDrop(event, 'pool')">
    </div>
  </aside>

  <!-- RIGHT: drop zones -->
  <section id="zones-panel"></section>
</main>

<footer>
  <button class="btn btn-primary" onclick="checkAnswers()">Auswerten</button>
  <button class="btn btn-secondary" onclick="resetAll()">Zurücksetzen</button>
  <div id="score-display">
    <div class="score-divider"></div>
    <div>
      <div class="score-badge" id="score-text"></div>
      <div class="score-sub" id="score-sub"></div>
    </div>
    <div>
      <div class="score-label" id="score-label"></div>
    </div>
    <div class="score-msg" id="score-msg"></div>
  </div>
</footer>

<script>

const sections = [
  {
    id: 'titel',
    title: 'Titel',
    number: '1',
    items: [
      'Umreißung der Frage und ggf. Nennung zentraler Begrifflichkeiten',
      'Eingrenzung eines Themenfeldes'
    ]
  },
  {
    id: 'einleitung',
    title: 'Einleitung',
    number: '2',
    items: [
      'Formulierung eines Problems, einer Frage und einer These',
      'Grenzen der Untersuchung',
      'Benennung der gewählten Quellengrundlage'
    ]
  },
  {
    id: 'forschungsstand',
    title: 'Forschungsstand',
    number: '3',
    items: [
      'Darstellung und Diskussion relevanter Vorarbeiten',
      'Vorläufige Positionierung im Forschungskontext'
    ]
  },
  {
    id: 'methoden',
    title: 'Methoden, Begriffe und Vorgehen',
    number: '4',
    items: [
      'Erläuterung des gewählten Vorgehens und der Quellenwahl', 
      'Definition zentraler analytischer Begriffe',
      'Verortung in bestimmtem methodischem Zugriff'
    ]
  },
  {
    id: 'empirie',
    title: 'Quellenanalyse',
    number: '5',
    items: [
      'Entwicklung und Falsifizierung der vertretenen These anhand von Quellen',
    ]
  },
  {
    id: 'diskussion',
    title: 'Diskussion',
    number: '6',
    items: [
      'Einordnung der zuvor gewonnenen Erkenntnisse', 
      'ggf. Qualifizierung/Quantifizierung der Kernthese',
      'Grenzen der Untersuchung und Einordnung im Gesamtkontext'
    ]
  },
  {
    id: 'fazit',
    title: 'Fazit',
    number: '7',
    items: [
      'Zusammenfassung der Erkenntnisse und Methode',
      'Ggf. Ausblick, Nennung von Desiderata'
    ]
  }
];

const totalItems = sections.reduce((s, sec) => s + sec.items.length, 0);

// Build flat list of all items with their correct section
const allItems = [];
sections.forEach(sec => {
  sec.items.forEach(text => {
    allItems.push({ id: sec.id + '-' + allItems.length, text, correctSection: sec.id });
  });
});

// Shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let draggedId = null;
let draggedFrom = null; // 'pool' or section id
let locked = false;

// ─────────────────────────────────────────────
// BUILD UI
// ─────────────────────────────────────────────
function buildZones() {
  const panel = document.getElementById('zones-panel');
  panel.innerHTML = '';
  sections.forEach(sec => {
    const wrapper = document.createElement('div');
    wrapper.className = 'drop-zone-wrapper';
    const expectedCount = sec.items.length;
    wrapper.innerHTML = `
      <div class="zone-header">
        <span class="zone-number">${sec.number}</span>
        <span class="zone-title">${sec.title}</span>
        <span class="zone-count">${expectedCount} ${expectedCount === 1 ? 'Element' : 'Elemente'}</span>
      </div>
      <div class="drop-zone" 
           id="zone-${sec.id}" 
           data-section="${sec.id}"
           data-placeholder="Karte hier ablegen …"
           ondragover="onDragOver(event)" 
           ondragleave="onDragLeave(event)" 
           ondrop="onDrop(event, '${sec.id}')">
      </div>`;
    panel.appendChild(wrapper);
  });
}

function buildPool() {
  const pool = document.getElementById('card-pool');
  pool.innerHTML = '';

  // Gruppenreihenfolge zufällig
  const shuffledSections = shuffle(sections);

  shuffledSections.forEach(sec => {
    const group = document.createElement('div');
    group.className = 'card-group';

    // Reihenfolge der Items innerhalb der Gruppe zufällig
    const groupItems = shuffle(allItems.filter(it => it.correctSection === sec.id));
    groupItems.forEach(item => group.appendChild(makeCard(item)));

    pool.appendChild(group);
  });

  updateProgress();
}

function makeCard(item) {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + item.id;
  card.dataset.id = item.id;
  card.dataset.correct = item.correctSection;
  card.draggable = true;
  card.innerHTML = `<span>${item.text}</span>`;
  card.addEventListener('dragstart', onDragStart);
  card.addEventListener('dragend', onDragEnd);
  card.addEventListener('touchstart', onTouchStart, { passive: false });
  card.addEventListener('touchmove', onTouchMove, { passive: false });
  card.addEventListener('touchend',  onTouchEnd,  { passive: false });
  return card;
}

// ─────────────────────────────────────────────
// DRAG & DROP
// ─────────────────────────────────────────────
function onDragStart(e) {
  if (locked) { e.preventDefault(); return; }
  draggedId = e.currentTarget.dataset.id;
  draggedFrom = e.currentTarget.parentElement.dataset.section || 'pool';
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', draggedId);
}
function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Find the actual drop target (zone or pool), not a child card
  const target = e.currentTarget;
  target.classList.add('drag-over');
}
function onDragLeave(e) {
  // Only remove if we're truly leaving the zone (not entering a child)
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove('drag-over');
  }
}
function onDrop(e, targetId) {
  e.preventDefault();
  e.stopPropagation();
  if (locked) return;
  e.currentTarget.classList.remove('drag-over');

  const id = draggedId || e.dataTransfer.getData('text/plain');
  if (!id) return;
  const card = document.getElementById('card-' + id);
  if (!card) return;

  // Remove evaluation styling when moved
  card.classList.remove('correct-placed', 'wrong-placed');
  const icon = card.querySelector('.correct-icon, .wrong-icon');
  if (icon) icon.remove();

  if (targetId === 'pool') {
    document.getElementById('card-pool').appendChild(card);
  } else {
    document.getElementById('zone-' + targetId).appendChild(card);
  }

  // Clear zone result styling when cards change
  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('correct', 'wrong'));
  document.getElementById('score-display').classList.remove('visible');

  draggedId = null;
  updateProgress();
}

// ─────────────────────────────────────────────
// TOUCH DRAG & DROP (WebKit / iOS Safari)
// ─────────────────────────────────────────────
let touchGhost = null;
let touchOffsetX = 0;
let touchOffsetY = 0;
let lastTouchTarget = null;
let lastTouchY = 0;
let scrollRAF  = null;

const SCROLL_MARGIN = 80; // px from viewport edge that triggers scrolling
const SCROLL_SPEED  = 12; // px per animation frame

function startAutoScroll() {
  if (scrollRAF) return; // already running
  function step() {
    const vh = window.innerHeight;
    if (lastTouchY < SCROLL_MARGIN) {
      // Near top — scroll up, faster the closer to the edge
      const intensity = 1 - (lastTouchY / SCROLL_MARGIN);
      window.scrollBy(0, -SCROLL_SPEED * intensity);
    } else if (lastTouchY > vh - SCROLL_MARGIN) {
      // Near bottom — scroll down
      const intensity = (lastTouchY - (vh - SCROLL_MARGIN)) / SCROLL_MARGIN;
      window.scrollBy(0, SCROLL_SPEED * intensity);
    }
    scrollRAF = requestAnimationFrame(step);
  }
  scrollRAF = requestAnimationFrame(step);
}

function stopAutoScroll() {
  if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
}

function onTouchStart(e) {
  if (locked) return;
  e.preventDefault();

  const card = e.currentTarget;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();

  draggedId   = card.dataset.id;
  draggedFrom = card.parentElement.dataset.section || 'pool';

  // Offset so the ghost tracks from where the finger landed on the card
  touchOffsetX = touch.clientX - rect.left;
  touchOffsetY = touch.clientY - rect.top;

  // Create a visual clone that follows the finger
  touchGhost = card.cloneNode(true);
  touchGhost.className = 'card touch-ghost';
  touchGhost.style.width  = rect.width  + 'px';
  touchGhost.style.left   = (touch.clientX - touchOffsetX) + 'px';
  touchGhost.style.top    = (touch.clientY - touchOffsetY) + 'px';
  document.body.appendChild(touchGhost);

  card.classList.add('dragging');
}

function onTouchMove(e) {
  if (!touchGhost) return;
  e.preventDefault();

  const touch = e.touches[0];
  lastTouchY = touch.clientY; // ← add this
  startAutoScroll();          // ← add this

  // Move ghost
  touchGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
  touchGhost.style.top  = (touch.clientY - touchOffsetY) + 'px';

  // Highlight the zone under the finger
  touchGhost.style.display = 'none';             // hide ghost so elementFromPoint works
  const el = document.elementFromPoint(touch.clientX, touch.clientY);
  touchGhost.style.display = '';

  document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));

  const zone = el && (el.closest('.drop-zone') || el.closest('#card-pool'));
  if (zone) zone.classList.add('drag-over');
  lastTouchTarget = zone || null;
}

function onTouchEnd(e) {
  if (!touchGhost) return;
  e.preventDefault();

  stopAutoScroll();

  // Clean up ghost + dragging style
  touchGhost.remove();
  touchGhost = null;

  const card = document.getElementById('card-' + draggedId);
  if (card) card.classList.remove('dragging');

  document.querySelectorAll('.drag-over').forEach(z => z.classList.remove('drag-over'));

  if (!lastTouchTarget || !card) { draggedId = null; return; }

  // Resolve target section id
  const targetId = lastTouchTarget.dataset.section || 'pool';

  // Reuse existing drop logic
  card.classList.remove('correct-placed', 'wrong-placed');
  const icon = card.querySelector('.correct-icon, .wrong-icon');
  if (icon) icon.remove();

  if (targetId === 'pool') {
    document.getElementById('card-pool').appendChild(card);
  } else {
    document.getElementById('zone-' + targetId).appendChild(card);
  }

  document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('correct', 'wrong'));
  document.getElementById('score-display').classList.remove('visible');

  draggedId = null;
  lastTouchTarget = null;
  updateProgress();
}

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────
function updateProgress() {
  const placed = document.querySelectorAll('.drop-zone .card').length;
  const pct = (placed / totalItems) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

// ─────────────────────────────────────────────
// EVALUATE  (+1 richtig, −1 falsch, 0 nicht platziert)
// ─────────────────────────────────────────────
function checkAnswers() {
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;

  // First clear old icons from pool cards
  document.querySelectorAll('#card-pool .card').forEach(card => {
    card.classList.remove('correct-placed', 'wrong-placed');
    const old = card.querySelector('.correct-icon, .wrong-icon');
    if (old) old.remove();
  });

  sections.forEach(sec => {
    const zone = document.getElementById('zone-' + sec.id);
    const cards = zone.querySelectorAll('.card');
    let allCorrect = true;

    cards.forEach(card => {
      const isRight = card.dataset.correct === sec.id;
      card.classList.remove('correct-placed', 'wrong-placed');
      const old = card.querySelector('.correct-icon, .wrong-icon');
      if (old) old.remove();

      if (isRight) {
        score++;
        correctCount++;
        card.classList.add('correct-placed');
        const ico = document.createElement('span');
        ico.className = 'correct-icon';
        ico.textContent = ' ✓';
        ico.style.cssText = 'color:#2e7d32;font-weight:bold;margin-left:auto;flex-shrink:0';
        card.appendChild(ico);
      } else {
        score--;
        wrongCount++;
        allCorrect = false;
        card.classList.add('wrong-placed');
        const ico = document.createElement('span');
        ico.className = 'wrong-icon';
        ico.textContent = ' ✗';
        ico.style.cssText = 'color:#c62828;font-weight:bold;margin-left:auto;flex-shrink:0';
        card.appendChild(ico);
      }
    });

    // Zone coloring
    if (cards.length > 0) {
      zone.classList.toggle('correct', allCorrect);
      zone.classList.toggle('wrong', !allCorrect);
    } else {
      zone.classList.remove('correct', 'wrong');
    }
  });

  // Score display
  const maxScore = totalItems; // 13
  const clampedPct = Math.max(0, Math.round((score / maxScore) * 100));

  const scoreDisplay = document.getElementById('score-display');
  scoreDisplay.classList.add('visible');

  const badge = document.getElementById('score-text');
  badge.textContent = (score >= 0 ? '+' : '') + score + ' Pkt.';
  badge.className = 'score-badge ' + (score > 0 ? 'positive' : score < 0 ? 'negative' : '');

  document.getElementById('score-label').textContent =
    `${correctCount} richtig, ${wrongCount} falsch (${document.querySelectorAll('#card-pool .card').length} nicht platziert)`;

  // Lock all interaction
  locked = true;
  document.body.classList.add('locked');
  document.querySelector('.btn-primary').disabled = true;
}

// ─────────────────────────────────────────────
// RESET
// ─────────────────────────────────────────────
function resetAll() {
  locked = false;
  document.body.classList.remove('locked');
  document.querySelector('.btn-primary').disabled = false;
  document.getElementById('score-display').classList.remove('visible');
  document.getElementById('score-text').className = 'score-badge';

  // Full rebuild from scratch
  buildZones();
  buildPool();
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildZones();
buildPool();
</script>
